<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secure Messenger</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0d14;
  --panel:#111827;
  --panel2:#0f1624;
  --text:#e8ecf7;
  --muted:#93a4c7;
  --border:rgba(255,255,255,0.08);
  --accent:#6c8cff;
  --accent2:#2ee6a6;
  --shadow:0 20px 60px rgba(0,0,0,0.45);
  --r:16px;
  --font:'Inter',sans-serif;
}

.light{
  --bg:#f5f7ff;
  --panel:#ffffff;
  --panel2:#f0f3ff;
  --text:#0f172a;
  --muted:#5a6478;
  --border:rgba(0,0,0,0.08);
  --shadow:0 20px 60px rgba(0,0,0,0.08);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* APP SHELL */
.app{
  max-width:920px;
  margin:0 auto;
  padding:24px;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}

.title{
  font-weight:700;
  letter-spacing:-0.3px;
}

.actions{
  display:flex;
  gap:10px;
}

.btn{
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--text);
  padding:10px 14px;
  border-radius:999px;
  font-size:13px;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  transform:translateY(-1px);
}

.btn.primary{
  background:linear-gradient(135deg,var(--accent),#8aa2ff);
  border:none;
  color:white;
}

/* MODE SWITCH */
.switch{
  display:flex;
  gap:10px;
  margin-bottom:18px;
}

.switch button{
  flex:1;
}

/* GRID CARDS */
.grid{
  display:grid;
  gap:14px;
}

/* CARD */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:16px;
  box-shadow:var(--shadow);
}

label{
  display:block;
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:8px;
}

textarea,input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--panel2);
  color:var(--text);
  font-family:var(--font);
  outline:none;
}

textarea{
  min-height:110px;
  resize:vertical;
}

/* LINK CARD (IMPORTANT FIX) */
.linkbox{
  background:var(--panel2);
  border:1px solid var(--border);
  padding:14px;
  border-radius:14px;
  font-size:12px;
  word-break:break-all;
  line-height:1.4;
}

/* BUTTON ROW */
.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.row button{
  flex:1;
}

/* RECEIVE */
.hidden{display:none}

.output{
  font-family:monospace;
  white-space:pre-wrap;
}

/* STATUS */
.status{
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <div class="title">🔐 Secure Messenger</div>
    <div class="actions">
      <button class="btn" onclick="toggleTheme()">Theme</button>
    </div>
  </div>

  <div class="switch">
    <button class="btn primary" id="sendBtn" onclick="setMode('send')">Send</button>
    <button class="btn" id="recvBtn" onclick="setMode('receive')">Receive</button>
  </div>

  <!-- SEND -->
  <div id="send">

    <div class="grid">

      <div class="card">
        <label>Message</label>
        <textarea id="msg"></textarea>
      </div>

      <div class="card">
        <label>Password (optional)</label>
        <input id="pass" type="password" placeholder="Adds encryption layer"/>
      </div>

      <div class="card">
        <button class="btn primary" onclick="generate()">Generate Secure Link</button>
      </div>

      <div class="card hidden" id="linkCard">
        <label>Share Link</label>
        <div class="linkbox" id="link"></div>

        <div class="row">
          <button class="btn" onclick="copy()">Copy</button>
          <button class="btn" onclick="share()">Share</button>
        </div>

        <div class="status">Encrypted using AES-256-GCM + PBKDF2 (when password used)</div>
      </div>

    </div>

  </div>

  <!-- RECEIVE -->
  <div id="receive" class="hidden">

    <div class="grid">

      <div class="card">
        <label>Status</label>
        <div class="status" id="status">Waiting for secure link...</div>
      </div>

      <div class="card">
        <label>Password</label>
        <input id="rpass" type="password"/>
      </div>

      <div class="card">
        <button class="btn primary" onclick="decrypt()">Decrypt</button>
      </div>

      <div class="card">
        <label>Message</label>
        <div class="output" id="out"></div>
      </div>

    </div>

  </div>

</div>

<script>

let mode="send";
let payload=null;

/* MODE */
function setMode(m){
  mode=m;

  document.getElementById("send").classList.toggle("hidden",m!=="send");
  document.getElementById("receive").classList.toggle("hidden",m!=="receive");

  document.getElementById("sendBtn").classList.toggle("primary",m==="send");
  document.getElementById("recvBtn").classList.toggle("primary",m==="receive");
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* CRYPTO */
const enc=new TextEncoder();
const dec=new TextDecoder();

async function derive(password,salt){
  const keyMat=await crypto.subtle.importKey(
    "raw",
    enc.encode(password),
    "PBKDF2",
    false,
    ["deriveKey"]
  );

  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt,iterations:120000,hash:"SHA-256"},
    keyMat,
    {name:"AES-GCM",length:256},
    false,
    ["encrypt","decrypt"]
  );
}

/* ENCRYPT */
async function encrypt(msg,pass){

  const iv=crypto.getRandomValues(new Uint8Array(12));
  const salt=crypto.getRandomValues(new Uint8Array(16));

  const key=pass
    ? await derive(pass,salt)
    : await crypto.subtle.generateKey(
        {name:"AES-GCM",length:256},
        true,
        ["encrypt","decrypt"]
      );

  const cipher=await crypto.subtle.encrypt(
    {name:"AES-GCM",iv},
    key,
    enc.encode(msg)
  );

  const raw=pass?null:await crypto.subtle.exportKey("raw",key);

  return {
    v:4,
    iv:[...iv],
    salt:[...salt],
    key:raw?[...new Uint8Array(raw)]:null,
    data:[...new Uint8Array(cipher)]
  };
}

/* GENERATE */
async function generate(){

  const msg=document.getElementById("msg").value;
  const pass=document.getElementById("pass").value;

  const data=await encrypt(msg,pass);
  const link=`${location.origin}${location.pathname}#SECMSG4.${btoa(JSON.stringify(data))}`;

  document.getElementById("link").textContent=link;
  document.getElementById("linkCard").classList.remove("hidden");
}

/* COPY */
function copy(){
  navigator.clipboard.writeText(document.getElementById("link").textContent);
}

/* SHARE */
function share(){
  const url=document.getElementById("link").textContent;
  navigator.share?navigator.share({text:url}):copy();
}

/* LOAD */
function load(){
  const h=location.hash;
  if(!h.includes("SECMSG4.")) return;

  payload=JSON.parse(atob(h.split("SECMSG4.")[1]));
  document.getElementById("status").textContent="Secure link loaded";
  setMode("receive");
}

/* DECRYPT */
async function decrypt(){

  try{
    const pass=document.getElementById("rpass").value;

    const iv=new Uint8Array(payload.iv);
    const data=new Uint8Array(payload.data);

    let key;

    if(payload.salt.length){
      key=await derive(pass,new Uint8Array(payload.salt));
    }else{
      key=await crypto.subtle.importKey(
        "raw",
        new Uint8Array(payload.key),
        "AES-GCM",
        false,
        ["decrypt"]
      );
    }

    const out=await crypto.subtle.decrypt(
      {name:"AES-GCM",iv},
      key,
      data
    );

    document.getElementById("out").textContent=dec.decode(out);

    history.replaceState({}, "", location.pathname);

  }catch(e){
    document.getElementById("out").textContent="Decryption failed";
  }
}

load();

</script>

</body>
</html>
