<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secure Messenger</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0e0f12;
  --card:#151822;
  --card2:#1b1f2e;
  --text:#e8ecf7;
  --muted:#8a90a6;
  --accent:#4f7cff;
  --border:#2a2f40;
  --mono:'IBM Plex Mono', monospace;
  --sans:'IBM Plex Sans', sans-serif;
  --r:14px;
}

.light{
  --bg:#f3f5fa;
  --card:#fff;
  --card2:#eef1f8;
  --text:#141722;
  --muted:#6b7280;
  --accent:#2f5ce8;
  --border:#d7dbea;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  padding:18px;
  transition:.35s ease;
}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.title{
  font-weight:700;
}

/* TOGGLE BUTTON GROUP */
.toggleGroup{
  display:flex;
  gap:8px;
}

.pill{
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  padding:8px 12px;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
  font-size:12px;
  transition:.25s;
}

.pill:hover{
  transform:translateY(-1px);
}

/* ACTIVE STATES */
.active{
  background:var(--accent);
  color:white;
  border-color:transparent;
}

/* MAIN WRAPPER (SMOOTH SWITCH) */
.wrapper{
  position:relative;
  overflow:hidden;
  border-radius:14px;
}

/* SLIDING PANES */
.panels{
  display:flex;
  width:200%;
  transition:transform .45s cubic-bezier(.4,.0,.2,1);
}

.panel{
  width:50%;
  padding:10px;
}

/* CARDS */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:12px;
}

.card input, .card textarea{
  width:100%;
  background:var(--card2);
  border:1px solid var(--border);
  color:var(--text);
  padding:10px;
  border-radius:10px;
  font-family:var(--mono);
  font-size:12px;
}

/* BUTTON */
.btn{
  background:var(--accent);
  color:white;
  border:none;
  padding:9px 12px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.75);
  color:white;
  padding:10px 14px;
  border-radius:999px;
  font-size:12px;
  opacity:0;
  transition:.25s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
</style>
</head>

<body>

<div class="topbar">
  <div class="title">🔐 Secure Messenger</div>

  <div class="toggleGroup">
    <button id="modeBtn" class="pill active" onclick="toggleMode()">Send</button>
    <button class="pill" onclick="document.body.classList.toggle('light')">Theme</button>
  </div>
</div>

<div class="wrapper">
<div class="panels" id="slider">

<!-- SEND -->
<div class="panel">

  <div class="card">
    <div>1. Identity</div>
    <button class="btn" onclick="genKeys()">Generate Identity</button>
  </div>

  <div class="card">
    <div>2. Optional Password</div>
    <input id="pass" placeholder="Password (optional)"/>
  </div>

  <div class="card">
    <div>3. Message</div>
    <textarea id="msg"></textarea>
  </div>

  <div class="card">
    <button class="btn" onclick="createPackage()">Export Secure File</button>
  </div>

</div>

<!-- RECEIVE -->
<div class="panel">

  <div class="card">
    <div>Upload Message File</div>
    <input type="file" onchange="loadFile(event)"/>
  </div>

  <div class="card">
    <div>Password (if required)</div>
    <input id="recvPass" type="password"/>
  </div>

  <div class="card">
    <button class="btn" onclick="decrypt()">Decrypt</button>
  </div>

  <div class="card">
    <div>Output</div>
    <div id="out"></div>
  </div>

</div>

</div>
</div>

<div class="toast" id="toast"></div>

<script>

let mode = 0; // 0 send, 1 receive
let priv = null;
let packageData = null;

/* MODE TOGGLE (SMOOTH SLIDE) */
function toggleMode(){
  mode = 1 - mode;

  document.getElementById('slider').style.transform =
    mode ? 'translateX(-50%)' : 'translateX(0%)';

  const btn = document.getElementById('modeBtn');
  btn.textContent = mode ? "Receive" : "Send";

  btn.classList.toggle('active');
}

/* KEY GEN */
async function genKeys(){
  const pair = await crypto.subtle.generateKey({
    name:"RSA-OAEP",
    modulusLength:2048,
    publicExponent:new Uint8Array([1,0,1]),
    hash:"SHA-256"
  }, true, ["encrypt","decrypt"]);

  priv = pair.privateKey;
  toast("Identity ready");
}

/* PACKAGE */
async function createPackage(){

  const msg = document.getElementById('msg').value;

  const aes = await crypto.subtle.generateKey(
    {name:"AES-GCM",length:256},
    true,
    ["encrypt","decrypt"]
  );

  const iv = crypto.getRandomValues(new Uint8Array(12));

  const enc = await crypto.subtle.encrypt(
    {name:"AES-GCM",iv},
    aes,
    new TextEncoder().encode(msg)
  );

  const raw = await crypto.subtle.exportKey("raw", aes);

  const pass = document.getElementById('pass').value;
  let key = raw;

  if(pass){
    const hash = await crypto.subtle.digest(
      "SHA-256",
      new TextEncoder().encode(pass)
    );

    const pwKey = await crypto.subtle.importKey(
      "raw",
      hash,
      "AES-GCM",
      false,
      ["encrypt","decrypt"]
    );

    key = await crypto.subtle.encrypt(
      {name:"AES-GCM",iv},
      pwKey,
      raw
    );
  }

  packageData = {
    iv:Array.from(iv),
    key:Array.from(new Uint8Array(key)),
    data:Array.from(new Uint8Array(enc)),
    protected:!!pass
  };

  const blob = new Blob([JSON.stringify(packageData)]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="secure-message.json";
  a.click();

  toast("File exported");
}

/* LOAD */
async function loadFile(e){
  packageData = JSON.parse(await e.target.files[0].text());
}

/* DECRYPT */
async function decrypt(){
  try{
    const iv = new Uint8Array(packageData.iv);
    let key = new Uint8Array(packageData.key);

    if(packageData.protected){
      const pass = document.getElementById('recvPass').value;

      const hash = await crypto.subtle.digest(
        "SHA-256",
        new TextEncoder().encode(pass)
      );

      const pwKey = await crypto.subtle.importKey(
        "raw",
        hash,
        "AES-GCM",
        false,
        ["decrypt"]
      );

      key = new Uint8Array(await crypto.subtle.decrypt(
        {name:"AES-GCM",iv},
        pwKey,
        key
      ));
    }

    const aes = await crypto.subtle.importKey(
      "raw",
      key,
      "AES-GCM",
      false,
      ["decrypt"]
    );

    const out = await crypto.subtle.decrypt(
      {name:"AES-GCM",iv},
      aes,
      new Uint8Array(packageData.data)
    );

    document.getElementById('out').textContent =
      new TextDecoder().decode(out);

    toast("Decrypted");

  }catch(e){
    document.getElementById('out').textContent =
      "Failed to decrypt";
  }
}

/* TOAST */
function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

</script>

</body>
</html>
