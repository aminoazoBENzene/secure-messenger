<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secure Messenger</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f1a;
  --card:#121a2a;
  --card2:#0f1626;
  --text:#e9eefc;
  --muted:#8ea0c7;
  --border:rgba(255,255,255,0.08);
  --accent:#6c8cff;
  --shadow:0 20px 60px rgba(0,0,0,0.4);
  --r:16px;
  --font:'Inter',sans-serif;
}

.light{
  --bg:#f5f7ff;
  --card:#ffffff;
  --card2:#f0f3ff;
  --text:#0f172a;
  --muted:#5b6475;
  --border:rgba(0,0,0,0.08);
  --shadow:0 20px 60px rgba(0,0,0,0.08);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
}

/* LAYOUT */
.app{
  max-width:900px;
  margin:auto;
  padding:24px;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.title{
  font-weight:700;
}

.btn{
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  padding:10px 14px;
  border-radius:999px;
  cursor:pointer;
}

/* SWITCH */
.switch{
  display:flex;
  gap:10px;
  margin-bottom:16px;
}

.switch button{
  flex:1;
}

.primary{
  background:var(--accent);
  color:white;
  border:none;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px;
  margin-bottom:12px;
}

label{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1px;
}

textarea,input{
  width:100%;
  margin-top:8px;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card2);
  color:var(--text);
  outline:none;
}

textarea{min-height:110px;}

/* LINK */
.link{
  font-size:12px;
  word-break:break-all;
  background:var(--card2);
  padding:12px;
  border-radius:12px;
}

/* HIDE */
.hidden{display:none}

/* OUTPUT */
.output{
  font-family:monospace;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <div class="title">🔐 Secure Messenger</div>
    <button class="btn" onclick="toggleTheme()">Theme</button>
  </div>

  <div class="switch">
    <button class="btn primary" id="sendBtn" onclick="setMode('send')">Send</button>
    <button class="btn" id="recvBtn" onclick="setMode('receive')">Receive</button>
  </div>

  <!-- SEND -->
  <div id="send">

    <div class="card">
      <label>Message</label>
      <textarea id="msg"></textarea>
    </div>

    <div class="card">
      <label>Password (optional)</label>
      <input id="pass" type="password"/>
    </div>

    <div class="card">
      <button class="btn primary" onclick="generate()">Generate Link</button>
    </div>

    <div class="card hidden" id="linkCard">
      <label>Share Link</label>
      <div class="link" id="link"></div>
      <button class="btn" onclick="copy()">Copy</button>
    </div>

  </div>

  <!-- RECEIVE -->
  <div id="receive" class="hidden">

    <div class="card">
      <label>Password</label>
      <input id="rpass" type="password"/>
    </div>

    <div class="card">
      <button class="btn primary" onclick="decrypt()">Decrypt</button>
    </div>

    <div class="card">
      <label>Message</label>
      <div class="output" id="out"></div>
    </div>

  </div>

</div>

<script>

let mode="send";
let payload=null;

/* MODE */
function setMode(m){
  mode=m;
  document.getElementById("send").classList.toggle("hidden",m!=="send");
  document.getElementById("receive").classList.toggle("hidden",m!=="receive");

  document.getElementById("sendBtn").classList.toggle("primary",m==="send");
  document.getElementById("recvBtn").classList.toggle("primary",m==="receive");
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* ENCODING SAFE */
function encodeBytes(arr){
  return btoa(String.fromCharCode(...new Uint8Array(arr)));
}

function decodeBytes(str){
  return Uint8Array.from(atob(str), c=>c.charCodeAt(0));
}

/* CRYPTO */
const enc=new TextEncoder();
const dec=new TextDecoder();

async function derive(pass,salt){
  const keyMat=await crypto.subtle.importKey(
    "raw",
    enc.encode(pass),
    "PBKDF2",
    false,
    ["deriveKey"]
  );

  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt,iterations:120000,hash:"SHA-256"},
    keyMat,
    {name:"AES-GCM",length:256},
    false,
    ["encrypt","decrypt"]
  );
}

/* ENCRYPT */
async function encrypt(msg,pass){

  const iv=crypto.getRandomValues(new Uint8Array(12));
  const salt=crypto.getRandomValues(new Uint8Array(16));

  const key=pass
    ? await derive(pass,salt)
    : await crypto.subtle.generateKey(
        {name:"AES-GCM",length:256},
        true,
        ["encrypt","decrypt"]
      );

  const cipher=await crypto.subtle.encrypt(
    {name:"AES-GCM",iv},
    key,
    enc.encode(msg)
  );

  const raw=pass?null:await crypto.subtle.exportKey("raw",key);

  return {
    v:4,
    iv:encodeBytes(iv),
    salt:encodeBytes(salt),
    key:raw?encodeBytes(raw):null,
    data:encodeBytes(cipher)
  };
}

/* GENERATE */
async function generate(){

  const msg=document.getElementById("msg").value;
  const pass=document.getElementById("pass").value;

  const data=await encrypt(msg,pass);

  const link=
    location.origin+
    location.pathname+
    "#SECMSG4."+btoa(JSON.stringify(data));

  document.getElementById("link").textContent=link;
  document.getElementById("linkCard").classList.remove("hidden");
}

/* COPY */
function copy(){
  navigator.clipboard.writeText(document.getElementById("link").textContent);
}

/* LOAD */
function load(){

  const h=location.hash;
  if(!h.includes("SECMSG4.")) return;

  try{
    payload=JSON.parse(atob(h.split("SECMSG4.")[1]));
    setMode("receive");
  }catch(e){
    console.log("Invalid link");
  }
}

/* DECRYPT */
async function decrypt(){

  try{
    const pass=document.getElementById("rpass").value;

    const iv=decodeBytes(payload.iv);
    const data=decodeBytes(payload.data);

    const salt=payload.salt?decodeBytes(payload.salt):null;

    let key;

    if(salt && salt.length){
      key=await derive(pass,salt);
    }else{
      key=await crypto.subtle.importKey(
        "raw",
        decodeBytes(payload.key),
        "AES-GCM",
        false,
        ["decrypt"]
      );
    }

    const out=await crypto.subtle.decrypt(
      {name:"AES-GCM",iv},
      key,
      data
    );

    document.getElementById("out").textContent=dec.decode(out);
    history.replaceState({}, "", location.pathname);

  }catch(e){
    document.getElementById("out").textContent="❌ Failed to decrypt";
  }
}

load();

</script>

</body>
</html>
