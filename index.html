<script>
/* ================================
   SECURE MESSENGER v5 (STABLE)
   FIXED TRANSPORT + RELIABLE LINKS
================================ */

let mode = "send";
let payload = null;

/* -------------------------------
   UI MODE SWITCH
-------------------------------- */

function setMode(m){
  mode = m;

  document.getElementById("send").classList.toggle("hidden", m !== "send");
  document.getElementById("receive").classList.toggle("hidden", m !== "receive");

  document.getElementById("sendBtn").classList.toggle("primary", m === "send");
  document.getElementById("recvBtn").classList.toggle("primary", m === "receive");
}

/* -------------------------------
   THEME
-------------------------------- */

function toggleTheme(){
  document.body.classList.toggle("light");
}

/* ===============================
   SAFE TRANSPORT ENCODING
   (THIS IS WHAT WAS BREAKING)
================================= */

/* Convert object → URL-safe string */
function encodePayload(obj){
  const json = JSON.stringify(obj);
  const bytes = new TextEncoder().encode(json);

  let bin = "";
  for (let i = 0; i < bytes.length; i++) {
    bin += String.fromCharCode(bytes[i]);
  }

  return btoa(bin)
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/g, "");
}

/* Convert URL-safe string → object */
function decodePayload(str){
  try {
    str = str.replace(/-/g, "+").replace(/_/g, "/");
    const pad = str.length % 4;
    if (pad) str += "=".repeat(4 - pad);

    const bin = atob(str);

    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) {
      bytes[i] = bin.charCodeAt(i);
    }

    return JSON.parse(new TextDecoder().decode(bytes));
  } catch (e) {
    return null;
  }
}

/* ===============================
   CRYPTO CORE (UNCHANGED, SAFE)
================================= */

const enc = new TextEncoder();
const dec = new TextDecoder();

async function deriveKey(password, salt){
  const baseKey = await crypto.subtle.importKey(
    "raw",
    enc.encode(password),
    "PBKDF2",
    false,
    ["deriveKey"]
  );

  return crypto.subtle.deriveKey(
    {
      name: "PBKDF2",
      salt,
      iterations: 120000,
      hash: "SHA-256"
    },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
}

/* ENCRYPT */
async function encryptMessage(message, password){

  const iv = crypto.getRandomValues(new Uint8Array(12));
  const salt = crypto.getRandomValues(new Uint8Array(16));

  const key = password
    ? await deriveKey(password, salt)
    : await crypto.subtle.generateKey(
        { name: "AES-GCM", length: 256 },
        true,
        ["encrypt", "decrypt"]
      );

  const cipherBuffer = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv },
    key,
    enc.encode(message)
  );

  const rawKey = password
    ? null
    : await crypto.subtle.exportKey("raw", key);

  return {
    v: 5,
    iv: Array.from(iv),
    salt: Array.from(salt),
    key: rawKey ? Array.from(new Uint8Array(rawKey)) : null,
    data: Array.from(new Uint8Array(cipherBuffer))
  };
}

/* ===============================
   GENERATE LINK
================================= */

async function generate(){

  const msg = document.getElementById("msg").value;
  const pass = document.getElementById("pass").value;

  if (!msg) return;

  const data = await encryptMessage(msg, pass);

  const encoded = encodePayload(data);

  const link =
    location.origin +
    location.pathname +
    "#SECMSG5." +
    encoded;

  document.getElementById("link").textContent = link;
  document.getElementById("linkCard").classList.remove("hidden");
}

/* COPY LINK */
function copy(){
  const link = document.getElementById("link").textContent;
  navigator.clipboard.writeText(link);
}

/* ===============================
   LOAD FROM LINK
================================= */

function loadFromHash(){
  const hash = location.hash;

  if (!hash.includes("SECMSG5.")) return;

  const encoded = hash.split("SECMSG5.")[1];
  payload = decodePayload(encoded);

  if (!payload) {
    alert("Invalid or corrupted link");
    return;
  }

  setMode("receive");
}

/* ===============================
   DECRYPT
================================= */

async function decrypt(){

  try {
    if (!payload) return;

    const pass = document.getElementById("rpass").value;

    const iv = new Uint8Array(payload.iv);
    const data = new Uint8Array(payload.data);
    const salt = payload.salt ? new Uint8Array(payload.salt) : null;

    let key;

    if (salt && salt.length > 0) {
      key = await deriveKey(pass, salt);
    } else {
      key = await crypto.subtle.importKey(
        "raw",
        new Uint8Array(payload.key),
        "AES-GCM",
        false,
        ["decrypt"]
      );
    }

    const result = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv },
      key,
      data
    );

    document.getElementById("out").textContent = dec.decode(result);

    history.replaceState({}, "", location.pathname);

  } catch (e) {
    document.getElementById("out").textContent = "❌ Decryption failed";
  }
}

/* ===============================
   INIT
================================= */

loadFromHash();

</script>
