<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secure Messenger v3</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f1a;
  --card:#121a2a;
  --card2:#0f1626;
  --text:#e9eefc;
  --muted:#8ea0c7;
  --accent:#6c8cff;
  --accent2:#7cf0c5;
  --border:rgba(255,255,255,0.08);
  --shadow: 0 20px 60px rgba(0,0,0,0.4);
  --r:16px;
  --font:'Inter', sans-serif;
}

.light{
  --bg:#f4f7ff;
  --card:#ffffff;
  --card2:#f1f4ff;
  --text:#0f172a;
  --muted:#5b6475;
  --border:rgba(0,0,0,0.08);
  --shadow: 0 20px 60px rgba(0,0,0,0.08);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  padding:18px;
  align-items:center;
}

.logo{
  font-weight:700;
  letter-spacing:-0.3px;
}

.switches{
  display:flex;
  gap:10px;
}

.btn{
  border:none;
  padding:10px 14px;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
  font-size:13px;
  background:var(--card);
  color:var(--text);
  border:1px solid var(--border);
  transition:.2s;
}

.btn:hover{transform:translateY(-1px)}

.btn.primary{
  background:linear-gradient(135deg,var(--accent),#8aa2ff);
  color:white;
  border:none;
}

/* LAYOUT */
.container{
  max-width:920px;
  margin:auto;
  padding:10px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:16px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

label{
  font-size:11px;
  color:var(--muted);
  letter-spacing:1px;
  text-transform:uppercase;
}

textarea,input{
  width:100%;
  margin-top:8px;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card2);
  color:var(--text);
  font-family:var(--font);
}

textarea{min-height:110px;resize:vertical}

/* LINK BOX */
.link{
  font-size:12px;
  word-break:break-all;
  background:var(--card2);
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
}

/* ROW */
.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.small{
  flex:1;
}

/* STATUS */
.status{
  font-size:12px;
  color:var(--muted);
  margin-top:6px;
}

/* RECEIVE */
.hidden{display:none}

/* OUTPUT */
.output{
  white-space:pre-wrap;
  font-family:monospace;
}
</style>
</head>

<body>

<div class="top">
  <div class="logo">🔐 Secure Messenger v3</div>

  <div class="switches">
    <button class="btn" id="modeBtn" onclick="toggleMode()">Send</button>
    <button class="btn" onclick="toggleTheme()">Theme</button>
  </div>
</div>

<div class="container">

<!-- SEND -->
<div id="send">

  <div class="card">
    <label>Message</label>
    <textarea id="msg"></textarea>
  </div>

  <div class="card">
    <label>Password (optional)</label>
    <input id="pass" type="password" placeholder="Optional protection layer"/>
  </div>

  <button class="btn primary" onclick="generate()">Generate Secure Link</button>

  <div class="card hidden" id="outCard">
    <label>Share Link</label>
    <div class="link" id="link"></div>

    <div class="row">
      <button class="btn small" onclick="copy()">Copy</button>
      <button class="btn small" onclick="share()">Share</button>
    </div>

    <div class="status">Only people with this link can decrypt the message.</div>
  </div>

</div>

<!-- RECEIVE -->
<div id="receive" class="hidden">

  <div class="card">
    <label>Status</label>
    <div class="status" id="status">Waiting for secure link...</div>
  </div>

  <div class="card">
    <label>Password</label>
    <input id="rpass" type="password"/>
  </div>

  <button class="btn primary" onclick="decrypt()">Decrypt Message</button>

  <div class="card">
    <label>Output</label>
    <div class="output" id="out"></div>
  </div>

</div>

</div>

<script>

/* MODE */
let mode="send";
let payload=null;

/* TOGGLE */
function toggleMode(){
  mode = mode==="send"?"receive":"send";
  document.getElementById("send").classList.toggle("hidden",mode!=="send");
  document.getElementById("receive").classList.toggle("hidden",mode!=="receive");
  document.getElementById("modeBtn").textContent = mode==="send"?"Send":"Receive";
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* HELPERS */
const enc = new TextEncoder();
const dec = new TextDecoder();

/* KEY DERIVATION */
async function deriveKey(password,salt){
  const base = await crypto.subtle.importKey(
    "raw",
    enc.encode(password),
    "PBKDF2",
    false,
    ["deriveKey"]
  );

  return crypto.subtle.deriveKey(
    {
      name:"PBKDF2",
      salt,
      iterations:120000,
      hash:"SHA-256"
    },
    base,
    {name:"AES-GCM",length:256},
    false,
    ["encrypt","decrypt"]
  );
}

/* ENCRYPT */
async function encryptMessage(msg,password){

  const iv = crypto.getRandomValues(new Uint8Array(12));
  const salt = crypto.getRandomValues(new Uint8Array(16));

  const key = password
    ? await deriveKey(password,salt)
    : await crypto.subtle.generateKey(
        {name:"AES-GCM",length:256},
        true,
        ["encrypt","decrypt"]
      );

  const cipher = await crypto.subtle.encrypt(
    {name:"AES-GCM",iv},
    key,
    enc.encode(msg)
  );

  const rawKey = password
    ? null
    : await crypto.subtle.exportKey("raw",key);

  return {
    v:3,
    iv:[...iv],
    salt:[...salt],
    key: rawKey ? [...new Uint8Array(rawKey)] : null,
    data:[...new Uint8Array(cipher)]
  };
}

/* GENERATE LINK */
async function generate(){

  const msg=document.getElementById("msg").value;
  const pass=document.getElementById("pass").value;

  const data = await encryptMessage(msg,pass);
  const encoded = btoa(JSON.stringify(data));

  const url = `${location.origin}${location.pathname}#SECMSG3.${encoded}`;

  document.getElementById("link").textContent=url;
  document.getElementById("outCard").classList.remove("hidden");
}

/* COPY */
function copy(){
  navigator.clipboard.writeText(document.getElementById("link").textContent);
}

/* SHARE */
function share(){
  const url=document.getElementById("link").textContent;
  navigator.share ? navigator.share({text:url}) : copy();
}

/* LOAD */
function load(){
  const h=location.hash;
  if(!h.includes("SECMSG3.")) return;

  try{
    payload=JSON.parse(atob(h.split("SECMSG3.")[1]));
    document.getElementById("status").textContent="Message loaded from secure link";
    toggleMode();
  }catch(e){
    document.getElementById("status").textContent="Invalid or corrupted link";
  }
}

/* DECRYPT */
async function decrypt(){

  try{
    const pass=document.getElementById("rpass").value;

    const iv=new Uint8Array(payload.iv);
    const data=new Uint8Array(payload.data);

    let key;

    if(payload.salt.length){
      key=await deriveKey(pass,new Uint8Array(payload.salt));
    }else{
      key=await crypto.subtle.importKey(
        "raw",
        new Uint8Array(payload.key),
        "AES-GCM",
        false,
        ["decrypt"]
      );
    }

    const out=await crypto.subtle.decrypt(
      {name:"AES-GCM",iv},
      key,
      data
    );

    document.getElementById("out").textContent=dec.decode(out);

    history.replaceState({}, "", location.pathname);

  }catch(e){
    document.getElementById("out").textContent="❌ Failed to decrypt (wrong password or invalid link)";
  }
}

load();

</script>

</body>
</html>
