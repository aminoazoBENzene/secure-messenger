<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secure Link Messenger</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0e0f12;
  --card:#151822;
  --card2:#1b2030;
  --text:#e9ecf5;
  --muted:#8b93a7;
  --accent:#4f7cff;
  --border:#2a3144;
  --good:#2dd4a0;
  --danger:#ff5c7a;
  --mono:'IBM Plex Mono', monospace;
  --sans:'IBM Plex Sans', sans-serif;
  --r:14px;
}

.light{
  --bg:#f4f6fb;
  --card:#ffffff;
  --card2:#eef1f8;
  --text:#111827;
  --muted:#6b7280;
  --accent:#2f5ce8;
  --border:#d7dbea;
  --good:#059669;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  transition:.3s;
}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
}

.title{
  font-weight:700;
}

/* TOGGLES */
.controls{
  display:flex;
  gap:8px;
}

.btn{
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{transform:translateY(-1px)}

.btn.active{
  background:var(--accent);
  color:white;
  border:none;
}

/* WRAPPER */
.container{
  max-width:900px;
  margin:0 auto;
  padding:10px;
}

/* PANELS */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px;
  margin-bottom:12px;
}

label{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1px;
}

input, textarea{
  width:100%;
  margin-top:6px;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card2);
  color:var(--text);
  font-family:var(--mono);
}

textarea{min-height:90px;resize:vertical}

.primary{
  background:var(--accent);
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  width:100%;
}

/* LINK BOX */
.linkbox{
  word-break:break-all;
  font-size:12px;
  background:var(--card2);
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
}

/* QR */
#qr{
  margin-top:10px;
  display:flex;
  justify-content:center;
}

/* RECEIVE STATE */
.hidden{display:none}

/* STATUS */
.status{
  font-size:12px;
  color:var(--muted);
}

/* SMALL BUTTON ROW */
.row{
  display:flex;
  gap:8px;
}

.small{
  flex:1;
  font-size:12px;
  padding:9px;
}

/* MESSAGE */
.output{
  white-space:pre-wrap;
  font-family:var(--mono);
}
</style>
</head>

<body>

<div class="topbar">
  <div class="title">🔐 Secure Link Messenger</div>

  <div class="controls">
    <button id="modeBtn" class="btn active" onclick="toggleMode()">Send</button>
    <button class="btn" onclick="toggleTheme()">Theme</button>
  </div>
</div>

<div class="container">

<!-- SEND -->
<div id="send">

  <div class="card">
    <label>Message</label>
    <textarea id="msg"></textarea>
  </div>

  <div class="card">
    <label>Password (optional)</label>
    <input id="pass" type="password" placeholder="Optional security layer"/>
  </div>

  <button class="primary" onclick="generateLink()">Generate Secure Link</button>

  <div class="card hidden" id="linkCard">
    <label>Share Link</label>
    <div class="linkbox" id="link"></div>

    <div class="row">
      <button class="btn small" onclick="copyLink()">Copy</button>
      <button class="btn small" onclick="shareLink()">Share</button>
    </div>

    <div id="qr"></div>

    <p class="status">⚡ Anyone with this link can open the encrypted message.</p>
  </div>

</div>

<!-- RECEIVE -->
<div id="receive" class="hidden">

  <div class="card">
    <label>Encrypted Link Detected</label>
    <div class="status" id="status">Waiting for link...</div>
  </div>

  <div class="card">
    <label>Password (if required)</label>
    <input id="rpass" type="password"/>
  </div>

  <button class="primary" onclick="decrypt()">Decrypt</button>

  <div class="card">
    <label>Message</label>
    <div class="output" id="out"></div>
  </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

/* STATE */
let data = null;
let mode = "send";

/* TOGGLE MODE */
function toggleMode(){
  mode = mode === "send" ? "receive" : "send";

  document.getElementById("send").classList.toggle("hidden", mode !== "send");
  document.getElementById("receive").classList.toggle("hidden", mode !== "receive");

  document.getElementById("modeBtn").textContent =
    mode === "send" ? "Send" : "Receive";
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* ENCRYPT */
async function encryptMessage(msg, pass){

  const enc = new TextEncoder();

  const key = await crypto.subtle.generateKey(
    {name:"AES-GCM", length:256},
    true,
    ["encrypt","decrypt"]
  );

  const iv = crypto.getRandomValues(new Uint8Array(12));

  let rawKey = await crypto.subtle.exportKey("raw", key);

  if(pass){
    const hash = await crypto.subtle.digest("SHA-256", enc.encode(pass));

    const pwKey = await crypto.subtle.importKey(
      "raw",
      hash,
      "AES-GCM",
      false,
      ["encrypt","decrypt"]
    );

    rawKey = await crypto.subtle.encrypt(
      {name:"AES-GCM", iv},
      pwKey,
      rawKey
    );
  }

  const cipher = await crypto.subtle.encrypt(
    {name:"AES-GCM", iv},
    key,
    enc.encode(msg)
  );

  const payload = {
    iv:[...iv],
    key:[...new Uint8Array(rawKey)],
    data:[...new Uint8Array(cipher)],
    p: !!pass
  };

  return btoa(JSON.stringify(payload));
}

/* GENERATE LINK */
async function generateLink(){

  const msg = document.getElementById("msg").value;
  const pass = document.getElementById("pass").value;

  const encoded = await encryptMessage(msg, pass);

  const url = `${location.origin}${location.pathname}#${encoded}`;

  document.getElementById("link").textContent = url;
  document.getElementById("linkCard").classList.remove("hidden");

  QRCode.toCanvas(document.getElementById("qr"), url, {width:160});
}

/* COPY */
function copyLink(){
  navigator.clipboard.writeText(document.getElementById("link").textContent);
}

/* SHARE */
function shareLink(){
  const url = document.getElementById("link").textContent;

  if(navigator.share){
    navigator.share({text:url});
  }else{
    copyLink();
  }
}

/* AUTO LOAD FROM URL */
function loadFromURL(){
  const hash = location.hash.slice(1);

  if(!hash) return;

  try{
    data = JSON.parse(atob(hash));
    document.getElementById("status").textContent = "Message loaded from link";
    toggleMode(); // auto switch to receive
  }catch(e){
    document.getElementById("status").textContent = "Invalid link";
  }
}

/* DECRYPT */
async function decrypt(){

  try{
    const pass = document.getElementById("rpass").value;
    const enc = new TextEncoder();

    let key = new Uint8Array(data.key);
    const iv = new Uint8Array(data.iv);

    if(data.p){

      const hash = await crypto.subtle.digest("SHA-256", enc.encode(pass));

      const pwKey = await crypto.subtle.importKey(
        "raw",
        hash,
        "AES-GCM",
        false,
        ["decrypt"]
      );

      key = new Uint8Array(await crypto.subtle.decrypt(
        {name:"AES-GCM", iv},
        pwKey,
        key
      ));
    }

    const aes = await crypto.subtle.importKey(
      "raw",
      key,
      "AES-GCM",
      false,
      ["decrypt"]
    );

    const out = await crypto.subtle.decrypt(
      {name:"AES-GCM", iv},
      aes,
      new Uint8Array(data.data)
    );

    const msg = new TextDecoder().decode(out);

    document.getElementById("out").textContent = msg;

    /* soft one-time behavior */
    history.replaceState({}, "", location.pathname);

  }catch(e){
    document.getElementById("out").textContent = "Failed to decrypt";
  }
}

loadFromURL();

</script>

</body>
</html>
